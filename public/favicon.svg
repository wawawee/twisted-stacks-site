<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="TwistedStacks">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0e0c"/>
      <stop offset="100%" stop-color="#432b25"/>
    </linearGradient>
    <radialGradient id="pearl" cx="0.3" cy="0.3" r="0.9">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#d8d2c8" stop-opacity="0.0"/>
    </radialGradient>
  </defs>

  <!-- Rounded square with warm brown gradient -->
  <rect x="2" y="2" width="60" height="60" rx="12" fill="url(#bg)"
        stroke="#7fc4e6" stroke-opacity="0.30" stroke-width="1.5"/>

  <!-- Twisted bracket suggestion: two angle brackets back-to-back -->
  <g fill="none" stroke="#7fc4e6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="22,20 14,32 22,44"/>
    <polyline points="42,20 50,32 42,44"/>
  </g>

  <!-- Centre pearl dot (the "button" — also doubles as the dot in TS monogram) -->
  <circle cx="32" cy="32" r="6" fill="url(#pearl)"/>
  <circle cx="32" cy="32" r="6" fill="none" stroke="#f0eee8" stroke-opacity="0.6"/>
</svg>
