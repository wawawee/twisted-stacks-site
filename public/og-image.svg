<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="TwistedStacks — AI systems showroom">
  <defs>
    <!-- Warm brown 5-step ramp from brand tokens -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0e0c"/>
      <stop offset="55%" stop-color="#261512"/>
      <stop offset="100%" stop-color="#2f1c18"/>
    </linearGradient>

    <!-- Pearl lustre for the wordmark button -->
    <radialGradient id="pearlLustre" cx="0.3" cy="0.3" r="0.9">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="40%" stop-color="#f0eee8" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#d8d2c8" stop-opacity="0.0"/>
    </radialGradient>

    <!-- Subtle mesh (2% warm overlay) — radial flares, no wood grain -->
    <radialGradient id="meshA" cx="0.12" cy="0.18" r="0.55">
      <stop offset="0%" stop-color="#7fc4e6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#7fc4e6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="meshB" cx="0.86" cy="0.82" r="0.5">
      <stop offset="0%" stop-color="#b06a78" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#b06a78" stop-opacity="0"/>
    </radialGradient>

    <!-- Mono / display stack -->
    <style>
      .mono  { font-family: "JetBrains Mono", "Fira Code", ui-monospace, "SF Mono", Menlo, monospace; }
      .display { font-family: "Space Grotesk", "Inter", ui-sans-serif, system-ui, sans-serif; }
    </style>
  </defs>

  <!-- Base -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#meshA)"/>
  <rect width="1200" height="630" fill="url(#meshB)"/>

  <!-- Thin warm stroke frame -->
  <rect x="40" y="40" width="1120" height="550" fill="none"
        stroke="#7fc4e6" stroke-opacity="0.18" stroke-width="1"/>

  <!-- Top eyebrow: mono kicker -->
  <g class="mono" fill="#7fc4e6" font-size="18" letter-spacing="3.5">
    <text x="80" y="100">TWISTEDSTACKS // AI SYSTEMS SHOWROOM</text>
  </g>

  <!-- Mark: stacked twisted brackets + pearl button -->
  <g transform="translate(80, 160)">
    <rect x="0" y="0" width="92" height="92" rx="6" fill="#432b25" stroke="#7fc4e6" stroke-opacity="0.30"/>
    <text x="46" y="62" class="display" font-size="48" font-weight="700" text-anchor="middle" fill="#f0eee8">TS</text>
    <circle cx="76" cy="16" r="22" fill="url(#pearlLustre)"/>
    <circle cx="76" cy="16" r="22" fill="none" stroke="#f0eee8" stroke-opacity="0.55"/>
  </g>

  <!-- Wordmark -->
  <g class="display" fill="#f6efe7">
    <text x="200" y="220" font-size="76" font-weight="700" letter-spacing="-1">TwistedStacks</text>
  </g>

  <!-- Tagline (display, warm white) -->
  <g class="display" fill="#f6efe7" font-size="34" font-weight="500">
    <text x="80" y="360">Useful systems. TWISTED edge.</text>
  </g>

  <!-- Subline (mono, dim) -->
  <g class="mono" fill="#a89589" font-size="20" letter-spacing="0.6">
    <text x="80" y="402">REVISION  ·  LAGA  ·  VR SUPARAYS  ·  CYMWAVE  ·  RECON</text>
  </g>

  <!-- Sensor row: small color chips (six Twisted sensor accents) -->
  <g transform="translate(80, 470)">
    <!-- RF -->
    <g><circle cx="14" cy="14" r="12" fill="#7fc4e6"/><text x="34" y="19" class="mono" font-size="14" fill="#d8c5b9" letter-spacing="1.5">RF</text></g>
    <!-- WiFi -->
    <g transform="translate(110, 0)"><circle cx="14" cy="14" r="12" fill="#9ad6c0"/><text x="34" y="19" class="mono" font-size="14" fill="#d8c5b9" letter-spacing="1.5">WIFI</text></g>
    <!-- Thermal -->
    <g transform="translate(230, 0)"><circle cx="14" cy="14" r="12" fill="#ff8a5e"/><text x="34" y="19" class="mono" font-size="14" fill="#d8c5b9" letter-spacing="1.5">THERMAL</text></g>
    <!-- EMF -->
    <g transform="translate(370, 0)"><circle cx="14" cy="14" r="12" fill="#e6c987"/><text x="34" y="19" class="mono" font-size="14" fill="#d8c5b9" letter-spacing="1.5">EMF</text></g>
    <!-- AC -->
    <g transform="translate(490, 0)"><circle cx="14" cy="14" r="12" fill="#e6887f"/><text x="34" y="19" class="mono" font-size="14" fill="#d8c5b9" letter-spacing="1.5">AC</text></g>
    <!-- Presence -->
    <g transform="translate(610, 0)"><circle cx="14" cy="14" r="12" fill="#c9a5cf"/><text x="34" y="19" class="mono" font-size="14" fill="#d8c5b9" letter-spacing="1.5">PRESENCE</text></g>
  </g>

  <!-- Bottom: domain + status (mono, dim) -->
  <g class="mono" fill="#7a6b62" font-size="18" letter-spacing="2.5">
    <text x="80" y="560">twistedstacks.com</text>
  </g>
  <g class="mono" fill="#7a6b62" font-size="18" letter-spacing="2.5" text-anchor="end">
    <text x="1120" y="560">v0.1  ·  GÖTEBORG  /  STOCKHOLM</text>
  </g>
</svg>
